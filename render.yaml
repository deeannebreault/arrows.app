databases:
  - name: arrows-collab-db
    databaseName: arrows_collab
    user: arrows
    plan: free

services:
  - type: web
    name: arrows-share-api
    runtime: node
    plan: free
    rootDir: server/share-server
    buildCommand: npm install && node migrate.js
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arrows-collab-db
          property: connectionString
    autoDeploy: true

  - type: web
    name: arrows-collab-ws
    runtime: python
    plan: free
    rootDir: server/ws-server
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: SHARE_SERVER_URL
        sync: false
    autoDeploy: true
